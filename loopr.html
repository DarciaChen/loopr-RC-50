<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>LOOPR · RC-50 Loop Station</title>
<style>
:root{
  --bg:#09090F;--panel:#111119;--card:#1C1C28;--card2:#212130;--border:#1F1F2C;
  --accent:#FFD60A;--green:#30D158;--red:#FF3B30;--orange:#FF9F0A;
  --blue:#64D2FF;--purple:#BF5AF2;--yellow:#FFD60A;
  --text:#E5E5EA;--muted:#48484E;--dim:#1E1E28;
  --font:'SF Mono','Menlo','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:48px}
button{cursor:pointer;border:none;outline:none;font-family:var(--font)}
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{background:var(--dim);height:3px;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;margin-top:-5.5px}
input[type=range]::-moz-range-track{background:var(--dim);height:3px;border-radius:2px}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;border:none}
input[type=number]{background:var(--bg);border:1px solid var(--border);color:var(--accent);
  font-family:var(--font);font-size:17px;font-weight:700;width:52px;text-align:center;
  border-radius:6px;padding:4px 0;outline:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── Header ── */
#hdr{padding:16px 16px 12px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center}
.logo{font-size:20px;font-weight:700;letter-spacing:5px}
.logo em{color:var(--accent);font-style:normal}
.logo small{font-size:9px;letter-spacing:2px;color:var(--muted);display:block;margin-top:1px}
.lang-btn{height:26px;padding:0 10px;border-radius:6px;font-size:10px;font-weight:700;
  letter-spacing:1px;background:var(--dim);border:1px solid var(--border);color:#888}

/* ── Master Clock ── */
#master-clock{
  padding:12px 16px 10px;border-bottom:1px solid var(--border);
  background:#0C0C16;
}
#mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
#mc-label{font-size:9px;letter-spacing:2px;color:var(--muted)}
#mc-info{display:flex;gap:12px;align-items:center}
#mc-pos{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:1px}
#mc-count{font-size:11px;color:var(--muted);letter-spacing:1px}
#mc-mode{display:flex;gap:4px}
.mc-mode-btn{height:24px;padding:0 10px;border-radius:6px;font-size:10px;font-weight:700;
  letter-spacing:1px;background:var(--dim);border:1px solid var(--border);color:var(--muted);transition:all .15s}
.mc-mode-btn.active{background:#FFD60A1A;border-color:#FFD60A55;color:var(--accent)}

/* Master Clock progress bar */
#mc-prog-wrap{
  height:6px;background:var(--dim);border-radius:3px;
  overflow:visible;position:relative;cursor:pointer;
}
#mc-prog-bar{
  height:100%;background:var(--accent);border-radius:3px;
  width:0%;pointer-events:none;transition:width .08s linear;
}
#mc-drag-handle{
  width:12px;height:12px;border-radius:50%;background:#fff;
  position:absolute;top:-3px;left:0%;transform:translateX(-50%);
  cursor:grab;pointer-events:auto;
  box-shadow:0 0 4px #00000088;
}

/* ── Global Controls ── */
#global{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.g-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.g-block{display:flex;flex-direction:column;gap:4px}
.g-label{font-size:9px;letter-spacing:2px;color:var(--muted)}
.bpm-row{display:flex;align-items:center;gap:5px}
.bpm-arr{width:24px;height:24px;border-radius:6px;background:var(--dim);border:1px solid var(--border);
  color:var(--text);font-size:13px;display:flex;align-items:center;justify-content:center}
.mvol-row{display:flex;align-items:center;gap:7px;min-width:100px}
.mvol-row input{flex:1}
.mvol-pct{font-size:10px;color:var(--muted);min-width:26px}
.tog{height:26px;padding:0 9px;border-radius:6px;font-size:10px;font-weight:700;
  letter-spacing:1px;background:var(--dim);border:1px solid var(--border);color:var(--muted);transition:all .15s}
.tog.on{background:#FFD60A1A;border-color:#FFD60A55;color:var(--accent)}
.tog.green.on{background:#30D1581A;border-color:#30D15855;color:var(--green)}
.mode-grp{display:flex;gap:4px}
.mode-btn{height:26px;padding:0 9px;border-radius:6px;font-size:10px;font-weight:700;
  letter-spacing:1px;background:var(--dim);border:1px solid var(--border);color:var(--muted);transition:all .15s}
.mode-btn.active{background:#FFD60A1A;border-color:#FFD60A55;color:var(--accent)}
.g-act{height:30px;padding:0 12px;border-radius:8px;font-size:10px;font-weight:700;
  letter-spacing:1px;border:1px solid;transition:all .15s}
.g-act-stop{background:#FF3B301A;border-color:#FF3B3055;color:var(--red)}
.g-act-clear{background:var(--dim);border-color:var(--border);color:var(--muted)}

/* ── Info / Error ── */
#info{padding:5px 16px 0;font-size:11px;color:var(--muted);letter-spacing:1px;min-height:20px}
#err{margin:6px 14px;padding:9px 13px;background:#3D1A1A;border-radius:9px;color:var(--red);font-size:12px;display:none}

/* ── Tracks ── */
#tracks{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.tc{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
@keyframes recGlow  {0%,100%{border-color:#FF3B3033}50%{border-color:#FF3B3099}}
@keyframes dubGlow  {0%,100%{border-color:#FF9F0A33}50%{border-color:#FF9F0A88}}
@keyframes playGlow {0%,100%{border-color:#1F1F2C}  50%{border-color:#30D15844}}
.tc[data-st=RECORDING]  {animation:recGlow  1s infinite}
.tc[data-st=OVERDUBBING]{animation:dubGlow  1.2s infinite}
.tc[data-st=PLAYBACK]   {animation:playGlow 2s infinite}

/* Track header */
.tc-hd{padding:11px 12px 8px;display:flex;align-items:center;gap:10px}
.led{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:all .2s}
.led-EMPTY      {background:#252532}
.led-RECORDING  {background:var(--red);box-shadow:0 0 7px #FF3B30BB}
.led-PLAYBACK   {background:var(--green);box-shadow:0 0 7px #30D158AA}
.led-OVERDUBBING{background:var(--orange);box-shadow:0 0 7px #FF9F0AAA}
.led-STOPPED    {background:#3A3A48}
.tc-meta{flex:1;min-width:0}
.tc-name{font-size:11px;font-weight:700;letter-spacing:3px}
.tc-state{font-size:9px;letter-spacing:2px;margin-top:1px}
.tc-loop-ct{font-size:9px;color:var(--muted);letter-spacing:1px}

/* VU */
.vu{display:flex;gap:1px;align-items:flex-end;height:16px;flex:1}
.vu-s{flex:1;border-radius:1px;transition:opacity .05s}

/* Track progress */
.tc-prog-wrap{height:3px;background:#0C0C14;margin:2px 12px 4px;border-radius:2px;overflow:hidden}
.tc-prog-bar{height:100%;width:0%;border-radius:2px}
.tc-time{font-size:9px;color:var(--muted);letter-spacing:.5px;padding:0 12px 2px;display:block;min-height:13px}

/* Volume */
.tc-vol{padding:0 12px 7px;display:flex;align-items:center;gap:7px}
.tc-vol input{flex:1}
.tc-vol-val{font-size:9px;color:var(--muted);min-width:24px;text-align:right}

/* Buttons */
.tc-btns1{padding:0 12px 6px;display:flex;gap:5px}
.tc-btns2{padding:0 12px 8px;display:flex;gap:5px}
.tbtn{height:34px;border-radius:9px;font-size:10px;font-weight:700;letter-spacing:1px;
  border:1px solid;transition:all .15s;white-space:nowrap;flex:1}
.tbtn:disabled{opacity:.25;cursor:default}

/* TRIGGER */
.tb-trig[data-s=EMPTY]      {background:#1A1A26;border-color:#252532;color:#50505E}
.tb-trig[data-s=RECORDING]  {background:#FF3B301E;border-color:#FF3B3066;color:var(--red)}
.tb-trig[data-s=PLAYBACK]   {background:#30D1581A;border-color:#30D15855;color:var(--green)}
.tb-trig[data-s=STOPPED]    {background:#FFD60A14;border-color:#FFD60A44;color:var(--yellow)}
.tb-trig[data-s=OVERDUBBING]{background:#1A1A26;border-color:#252532;color:#333340}

/* STOP */
.tb-stop{background:var(--dim);border-color:var(--border);color:#5A5A6E}

/* DUB */
.tb-dub{background:var(--dim);border-color:var(--border);color:#5A5A6E}
.tb-dub.dubbing{background:#FF9F0A1A;border-color:#FF9F0A55;color:var(--orange)}
.tb-dub:disabled{opacity:.2}

/* MUTE */
.tb-mute{background:var(--dim);border-color:var(--border);color:#5A5A6E}
.tb-mute.muting{background:#FFD60A1A;border-color:#FFD60A55;color:var(--yellow)}

/* UNDO/REDO/CLEAR */
.tb-undo,.tb-redo{background:var(--dim);border-color:var(--border);color:#5A5A6E}
.tb-clear{background:var(--dim);border-color:var(--border);color:#5A5A6E}

/* Track opts */
.tc-opts{padding:0 12px 10px;display:flex;gap:5px;flex-wrap:wrap}
.opt-btn{height:24px;padding:0 9px;border-radius:6px;font-size:9px;font-weight:700;
  letter-spacing:1px;background:var(--dim);border:1px solid var(--border);color:var(--muted);transition:all .15s}
.opt-btn.on{background:#64D2FF14;border-color:#64D2FF44;color:var(--blue)}
.dub-mode-grp{display:flex;gap:3px}
.dm-btn{height:24px;padding:0 8px;border-radius:6px;font-size:9px;font-weight:700;
  letter-spacing:1px;background:var(--dim);border:1px solid var(--border);color:var(--muted);transition:all .15s}
.dm-btn.active{background:#2A2A38;border-color:#44445A;color:#C8C8D8}
/* ── Help Modal ── */
#help-modal{
  display:none; position:fixed; inset:0; background:#000000CC;
  z-index:200; padding:0;
}
#help-modal.show{display:flex}
#help-panel{
  background:#FAFAF7; color:#1A1A1A; width:100%; height:100%;
  display:flex; flex-direction:column; font-family:-apple-system,system-ui,sans-serif;
}
#help-header{
  padding:16px 18px; border-bottom:1px solid #E5E5E0;
  display:flex; justify-content:space-between; align-items:center;
  background:#fff; flex-shrink:0;
}
#help-title{font-size:16px; font-weight:700; letter-spacing:1px; color:#1A1A1A}
#help-close{
  width:30px; height:30px; border-radius:50%; background:#F0F0EC;
  color:#666; font-size:14px; border:none;
}
#help-body{
  flex:1; overflow-y:auto; padding:18px 20px 40px;
  font-size:14px; line-height:1.75; color:#2A2A2A;
}
#help-body h2{
  font-size:16px; margin:22px 0 10px; padding-bottom:6px;
  border-bottom:2px solid #1A1A1A; color:#1A1A1A;
}
#help-body h2:first-child{margin-top:0}
#help-body h3{font-size:14px; margin:16px 0 6px; color:#333}
#help-body p{margin:6px 0}
#help-body ul,#help-body ol{margin:6px 0; padding-left:20px}
#help-body li{margin:4px 0}
#help-body table{width:100%; border-collapse:collapse; margin:10px 0; font-size:13px}
#help-body th,#help-body td{border:1px solid #DDD; padding:7px 9px; text-align:left}
#help-body th{background:#2A2A2A; color:#fff}
#help-body tr:nth-child(even){background:#F4F4F0}
#help-body .h-box{
  background:#F4F1E6; border-left:3px solid #C9960C;
  padding:9px 13px; margin:10px 0; border-radius:0 6px 6px 0; font-size:13px;
}
#help-body .h-warn{
  background:#FBEFEE; border-left:3px solid #D9534F;
  padding:9px 13px; margin:10px 0; border-radius:0 6px 6px 0; font-size:13px;
}
#help-body .h-tip{
  background:#EDF6EE; border-left:3px solid #4A9D5C;
  padding:9px 13px; margin:10px 0; border-radius:0 6px 6px 0; font-size:13px;
}
#help-body .h-tag{
  display:inline-block; font-family:monospace; font-size:12px;
  background:#2A2A2A; color:#fff; padding:2px 7px; border-radius:4px;
}
#help-body .h-flow{display:flex; align-items:center; gap:6px; margin:12px 0; flex-wrap:wrap; font-size:12px}
#help-body .h-step{background:#F0F0EC; border:1px solid #DDD; padding:6px 10px; border-radius:6px; text-align:center}
#help-body .h-arrow{color:#999}
</style>
</head>
<body>

<!-- Header -->
<div id="hdr">
  <div class="logo">LOOP<em>R</em><small>RC-50 LOOP STATION</small></div>
  <div style="display:flex;gap:8px">
    <button class="lang-btn" id="help-btn" onclick="openHelp()">?</button>
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">中文</button>
  </div>
</div>

<!-- Master Clock -->
<div id="master-clock">
  <div id="mc-top">
    <div id="mc-label">MASTER CLOCK</div>
    <div id="mc-info">
      <span id="mc-pos">-- / --</span>
      <span id="mc-count"></span>
      <div id="mc-mode">
        <button class="mc-mode-btn active" id="mc-live" onclick="setLoopMode('LIVE')">LIVE</button>
        <button class="mc-mode-btn" id="mc-step" onclick="setLoopMode('STEP')">STEP</button>
      </div>
    </div>
  </div>
  <div id="mc-prog-wrap">
    <div id="mc-prog-bar"></div>
    <div id="mc-drag-handle"></div>
  </div>
</div>

<!-- Global Controls -->
<div id="global">
  <div class="g-row">
    <div class="g-block">
      <div class="g-label" id="lbl-bpm">BPM</div>
      <div class="bpm-row">
        <button class="bpm-arr" onclick="changeBPM(-1)">−</button>
        <input type="number" id="bpm-in" value="120" min="40" max="240"
          oninput="setBPM(this.value)" onchange="setBPM(this.value)">
        <button class="bpm-arr" onclick="changeBPM(1)">+</button>
      </div>
    </div>
    <div class="g-block" style="flex:1;min-width:100px">
      <div class="g-label" id="lbl-mvol">MASTER VOL</div>
      <div class="mvol-row">
        <input type="range" min="0" max="2" step="0.02" value="1.0" oninput="setMasterVol(this.value)">
        <span class="mvol-pct" id="mvol-pct">85%</span>
      </div>
    </div>
    <div class="g-block">
      <div class="g-label" id="lbl-mode">MODE</div>
      <div class="mode-grp">
        <button class="mode-btn active" id="md-multi" onclick="setMode('MULTI')">MULTI</button>
        <button class="mode-btn" id="md-single" onclick="setMode('SINGLE')">SINGLE</button>
      </div>
    </div>
  </div>
  <div class="g-row">
    <button class="tog green on" id="tog-sync"  onclick="toggle('loopSync')">LOOP SYNC</button>
    <button class="tog" id="tog-cin"   onclick="toggle('countIn')">COUNT-IN</button>
    <button class="tog" id="tog-arec"  onclick="toggle('autoRec')">AUTO REC</button>
    <button class="tog" id="tog-metro" onclick="toggle('metro')">♩ METRO</button>
    <button class="tog" id="tog-lq"    onclick="toggle('loopQuant')">QUANTIZE</button>
    <button class="g-act g-act-stop"  onclick="allStop()" id="btn-allstop">◼ ALL STOP</button>
    <button class="g-act g-act-clear" onclick="clearAll()" id="btn-clearall">CLEAR ALL</button>
  </div>
</div>

<div id="err"></div>
<div id="info">tap TRIGGER to record</div>
<div id="tracks"></div>

<script>
// ════════════════════════════════════════════════════════
// 語言字典
// ════════════════════════════════════════════════════════
let lang = 'EN';
const T = {
  EN: {
    trig: { EMPTY:'● REC', RECORDING:'■ STOP', PLAYBACK:'■ STOP', STOPPED:'▶ PLAY', OVERDUBBING:'' },
    state: { EMPTY:'EMPTY', RECORDING:'REC ●', PLAYBACK:'PLAY', OVERDUBBING:'DUB ●', STOPPED:'STOPPED' },
    dub_on:'■ DUB', dub_off:'● DUB',
    stop:'◼ STOP', undo:'↺ UNDO', redo:'↻ REDO', clear:'✕ CLEAR',
    mute:'MUTE', muted:'MUTED',
    one_shot:'ONE SHOT', dub:'DUB', replace:'REPLACE',
    all_stop:'◼ ALL STOP', clear_all:'CLEAR ALL',
    loop_sync:'LOOP SYNC', count_in:'COUNT-IN', auto_rec:'AUTO REC',
    metro:'♩ METRO', quantize:'QUANTIZE',
    multi:'MULTI', single:'SINGLE', master_vol:'MASTER VOL', mode:'MODE', bpm:'BPM',
    mc_label:'MASTER CLOCK', mc_waiting:'waiting for first track',
    live:'LIVE', step:'STEP', track:'TRACK', lang_btn:'中文',
    info_default:'tap TRIGGER to record',
  },
  ZH: {
    trig: { EMPTY:'● 錄音', RECORDING:'■ 停止', PLAYBACK:'■ 停止', STOPPED:'▶ 播放', OVERDUBBING:'' },
    state: { EMPTY:'空軌', RECORDING:'錄音中 ●', PLAYBACK:'播放中', OVERDUBBING:'疊錄中 ●', STOPPED:'已停止' },
    dub_on:'■ 疊錄', dub_off:'● 疊錄',
    stop:'◼ 停止', undo:'↺ 復原', redo:'↻ 重做', clear:'✕ 清除',
    mute:'靜音', muted:'靜音中',
    one_shot:'單次播放', dub:'疊錄', replace:'覆蓋',
    all_stop:'◼ 全部停止', clear_all:'全部清除',
    loop_sync:'循環同步', count_in:'數拍進入', auto_rec:'自動錄音',
    metro:'♩ 節拍器', quantize:'拍點對齊',
    multi:'多軌', single:'單軌', master_vol:'主音量', mode:'模式', bpm:'BPM',
    mc_label:'主時鐘', mc_waiting:'等待第一軌',
    live:'LIVE', step:'STEP', track:'軌道', lang_btn:'Eng',
    info_default:'點擊 錄音 開始',
  }
};

// ════════════════════════════════════════════════════════
// 常數
// ════════════════════════════════════════════════════════
const S = {
  EMPTY:'EMPTY', RECORDING:'RECORDING', PLAYBACK:'PLAYBACK',
  OVERDUBBING:'OVERDUBBING', STOPPED:'STOPPED', STANDBY:'STANDBY'
};
const TRACK_COUNT  = 5;
const TRACK_COLORS = ['#FF453A','#FF9F0A','#30D158','#64D2FF','#BF5AF2'];
const SEGS         = 22;

// ════════════════════════════════════════════════════════
// 全域設定
// ════════════════════════════════════════════════════════
let bpm       = 120;
let playMode  = 'MULTI';  // MULTI | SINGLE
let loopMode  = 'LIVE';   // LIVE | STEP
let loopSync  = true;
let countIn   = false;
let autoRec   = false;
let metroOn   = false;
let loopQuant = false;
let metroNext = 0;

// ════════════════════════════════════════════════════════
// 音訊引擎
// ════════════════════════════════════════════════════════
let audioCtx   = null;
let masterGain = null;
let micStream  = null;
let micAnalyser= null;
let micInputGain    = null;  // 麥克風前級增益節點
let micRecordStream = null;  // 增益後、實際用於 MediaRecorder 的 stream

// Master Clock — 從第一軌錄完開始永遠跑
let masterLoopLen  = null;  // 第一軌決定的循環長度（秒）
let loopStartTime  = null;  // AudioContext 時間基準點
let clockRunning   = false;

let autoRecTimer = null;

// ════════════════════════════════════════════════════════
// 軌道資料
// ════════════════════════════════════════════════════════
const tracks = Array.from({length:TRACK_COUNT}, (_, i) => ({
  id:           i,
  state:        S.EMPTY,
  buffer:       null,
  prevBuffer:   null,
  redoBuffer:   null,
  volume:       0.8,
  muted:        false,
  oneShot:      false,
  dubMode:      'DUB',
  loopCount:    0,
  sourceNode:   null,
  gainNode:     null,
  analyserNode: null,
  mediaRecorder:null,
  recChunks:    [],
  isFirstTrack: false,
  // LIVE 模式：記錄「預約錄音」的時機
  recScheduled: false,
}));

const smoothLv = new Float32Array(TRACK_COUNT);

// ════════════════════════════════════════════════════════
// 初始化 AudioContext + 麥克風
// ════════════════════════════════════════════════════════
async function initAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    return true;
  }
  try {
    audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.5;
    masterGain.connect(audioCtx.destination);
    micStream = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });

    // iOS fix：強制音訊輸出走主喇叭而非聽筒
    const iosFix = document.createElement('audio');
    iosFix.muted = true;
    iosFix.playsInline = true;
    iosFix.srcObject = micStream;
    iosFix.play().catch(() => {});

    // iOS 錄音增益修正：
    // iOS 的 getUserMedia 原始輸入音量明顯偏低，MediaRecorder 直接吃
    // micStream 會錄到過小聲的內容。這裡用 GainNode 把訊號放大後，
    // 透過 MediaStreamDestinationNode 重新合成一個「已增益」的 stream，
    // 實際錄音與 VU meter 都改用這個增益後的 stream。
    micInputGain = audioCtx.createGain();
    micInputGain.gain.value = 2.2;  // 麥克風前級增益，可依測試結果微調

    const micSrcNode = audioCtx.createMediaStreamSource(micStream);
    micSrcNode.connect(micInputGain);

    micAnalyser = audioCtx.createAnalyser();
    micAnalyser.fftSize = 256;
    micInputGain.connect(micAnalyser);

    const micDest = audioCtx.createMediaStreamDestination();
    micInputGain.connect(micDest);
    micRecordStream = micDest.stream;  // 錄音改用這個增益後的 stream

    return true;
  } catch(e) {
    showErr('⚠ 無法存取麥克風：' + e.message);
    return false;
  }
}

// ════════════════════════════════════════════════════════
// Master Clock 工具
// ════════════════════════════════════════════════════════

// 當前在主循環中的位置（秒）
function masterClockPos() {
  if (!clockRunning || !audioCtx) return 0;
  return (audioCtx.currentTime - loopStartTime) % masterLoopLen;
}

// 距離下一個 loop 邊界還有幾秒
function timeToNextBoundary() {
  if (!masterLoopLen) return 0;
  const pos = masterClockPos();
  return masterLoopLen - pos;
}

// ════════════════════════════════════════════════════════
// 音訊緩衝區工具
// ════════════════════════════════════════════════════════

// Overdub 混音
async function mixBuffers(existing, newBuf) {
  const len = Math.max(existing.length, newBuf.length);
  const ch  = Math.max(existing.numberOfChannels, newBuf.numberOfChannels);
  const out = audioCtx.createBuffer(ch, len, audioCtx.sampleRate);
  for (let c = 0; c < ch; c++) {
    const o  = out.getChannelData(c);
    const d1 = c < existing.numberOfChannels ? existing.getChannelData(c) : new Float32Array(len);
    const d2 = c < newBuf.numberOfChannels   ? newBuf.getChannelData(c)   : new Float32Array(len);
    for (let i = 0; i < len; i++)
      o[i] = (i<d1.length?d1[i]:0)*0.85 + (i<d2.length?d2[i]:0)*0.85;
  }
  return out;
}

// Loop Sync：補靜音到 masterLoopLen，起點對齊（前面補靜音）
function fitToMasterLen(buf, offsetSec) {
  if (!masterLoopLen) return buf;
  const sr        = audioCtx.sampleRate;
  const targetLen = Math.round(masterLoopLen * sr);
  const offsetLen = Math.round((offsetSec || 0) * sr);
  const ch        = buf.numberOfChannels;
  const out       = audioCtx.createBuffer(ch, targetLen, sr);
  for (let c = 0; c < ch; c++) {
    const src = buf.getChannelData(c);
    const dst = out.getChannelData(c);
    // 從 offsetLen 位置開始放入錄音內容，前面是靜音
    const copyLen = Math.min(src.length, targetLen - offsetLen);
    if (copyLen > 0) dst.set(src.subarray(0, copyLen), offsetLen);
  }
  return out;
}

// ════════════════════════════════════════════════════════
// 播放控制
// ════════════════════════════════════════════════════════
function stopSource(t) {
  if (t.sourceNode) {
    try { t.sourceNode.stop(); } catch(e) {}
    t.sourceNode = null;
  }
  // 同時斷開 gain/analyser 避免記憶體洩漏
  if (t.gainNode)     { try { t.gainNode.disconnect(); }     catch(e) {} }
  if (t.analyserNode) { try { t.analyserNode.disconnect(); } catch(e) {} }
}

function fadeStop(t, callback) {
  if (!t.gainNode) { stopSource(t); if(callback) callback(); return; }
  const now = audioCtx.currentTime;
  t.gainNode.gain.cancelScheduledValues(now);
  t.gainNode.gain.setValueAtTime(t.gainNode.gain.value || t.volume, now);
  t.gainNode.gain.linearRampToValueAtTime(0.001, now + 0.2);
  setTimeout(() => { stopSource(t); if(callback) callback(); }, 230);
}

// 排程播放，對齊 Master Clock 當前位置
function playTrack(t, fadeIn) {
  stopSource(t);
  if (!t.buffer || !audioCtx) return;

  const gain = audioCtx.createGain();
  if (fadeIn) {
    gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(t.muted ? 0 : t.volume, audioCtx.currentTime + 0.2);
  } else {
    gain.gain.value = t.muted ? 0 : t.volume;
  }
  t.gainNode = gain;

  const an = audioCtx.createAnalyser(); an.fftSize = 256;
  t.analyserNode = an;
  gain.connect(an); an.connect(masterGain);

  const src = audioCtx.createBufferSource();
  src.buffer  = t.buffer;
  src.loop    = !t.oneShot;
  src.loopEnd = t.buffer.duration;
  src.connect(gain);
  t.sourceNode = src;

  // 對齊 Master Clock 當前位置
  const now    = audioCtx.currentTime;
  const offset = clockRunning
    ? ((now - loopStartTime) % masterLoopLen) % t.buffer.duration
    : 0;
  src.start(now, offset);

  if (t.oneShot) {
    src.onended = () => { t.sourceNode = null; setState(t, S.STOPPED); };
  }
}

// ════════════════════════════════════════════════════════
// 節拍器
// ════════════════════════════════════════════════════════
function scheduleMetro() {
  if (!metroOn || !audioCtx) return;
  const now = audioCtx.currentTime;
  const iv  = 60 / bpm;
  if (metroNext < now) metroNext = now;
  while (metroNext < now + 0.4) {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    const beat = Math.round((metroNext - (loopStartTime || now)) / iv) % 4;
    osc.frequency.value = beat === 0 ? 1320 : 660;
    g.gain.setValueAtTime(0.25, metroNext);
    g.gain.exponentialRampToValueAtTime(0.001, metroNext + 0.06);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(metroNext); osc.stop(metroNext + 0.07);
    metroNext += iv;
  }
  setTimeout(scheduleMetro, 180);
}

// ════════════════════════════════════════════════════════
// Count-In
// ════════════════════════════════════════════════════════
function playCountIn(beats, callback) {
  if (!audioCtx) { callback(); return; }
  const iv = 60 / bpm;
  for (let i = 0; i < beats; i++) {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    const t0  = audioCtx.currentTime + i * iv + 0.02;
    osc.frequency.value = i === 0 ? 1320 : 880;
    g.gain.setValueAtTime(0.4, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.08);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + 0.09);
  }
  setTimeout(callback, beats * iv * 1000 + 50);
}

// ════════════════════════════════════════════════════════
// 錄音
// ════════════════════════════════════════════════════════
function getMime() {
  return ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4','']
    .find(t => !t || MediaRecorder.isTypeSupported(t)) || '';
}

function doStartRecording(t) {
  t.recChunks = [];
  const mime  = getMime();
  const rec   = new MediaRecorder(micRecordStream, mime ? {mimeType:mime} : {});
  rec.ondataavailable = e => { if (e.data.size > 0) t.recChunks.push(e.data); };
  rec.start(50);
  t.mediaRecorder = rec;
}

async function startRecording(t, isOverdub) {
  if (!await initAudio()) return;
  t.isFirstTrack = (!isOverdub && !clockRunning);

  const doRec = () => {
    if (autoRec && !isOverdub) {
      setState(t, S.STANDBY);
      startAutoRecMonitor(t);
      setInfo(T[lang].info_default);
    } else {
      doStartRecording(t);
      setState(t, isOverdub ? S.OVERDUBBING : S.RECORDING);
    }
  };

  if (loopMode === 'LIVE' && clockRunning && !isOverdub) {
    // LIVE 模式：等到下一個 loop 邊界才開始錄
    t.recScheduled = true;
    setState(t, S.STANDBY);
    setInfo('LIVE: waiting for loop boundary…');
    const waitMs = timeToNextBoundary() * 1000;
    setTimeout(() => {
      if (t.recScheduled) {
        t.recScheduled = false;
        doStartRecording(t);
        setState(t, S.RECORDING);
        setInfo('Track ' + (t.id+1) + ' recording…');
      }
    }, Math.max(0, waitMs - 20));
  } else if (countIn && !isOverdub) {
    setState(t, S.STANDBY);
    setInfo('Count-in…');
    playCountIn(4, doRec);
  } else {
    doRec();
  }
}

function startAutoRecMonitor(t) {
  clearInterval(autoRecTimer);
  autoRecTimer = setInterval(() => {
    if (!micAnalyser) return;
    if (getRMS(micAnalyser) > 0.015) {
      clearInterval(autoRecTimer); autoRecTimer = null;
      doStartRecording(t);
      t.state = S.RECORDING;
      rerenderTrack(t.id);
    }
  }, 40);
}

// 錄音結束，處理 buffer
function stopRecording(t, isOverdub) {
  return new Promise(resolve => {
    if (autoRecTimer) { clearInterval(autoRecTimer); autoRecTimer = null; }
    t.recScheduled = false;

    const rec = t.mediaRecorder;
    if (!rec || rec.state === 'inactive') {
      setState(t, t.buffer ? S.STOPPED : S.EMPTY);
      resolve(); return;
    }

    const doStop = () => {
      rec.onstop = async () => {
        try {
          const blob   = new Blob(t.recChunks, {type: t.recChunks[0]?.type || 'audio/webm'});
          let newBuf   = await audioCtx.decodeAudioData(await blob.arrayBuffer());

          if (isOverdub && t.buffer) {
            t.redoBuffer = null;
            t.prevBuffer = t.buffer;
            if (loopSync && masterLoopLen) newBuf = fitToMasterLen(newBuf, 0);
            t.buffer = t.dubMode === 'REPLACE'
              ? newBuf
              : await mixBuffers(t.buffer, newBuf);
          } else {
            t.prevBuffer = null;
            t.redoBuffer = null;

            if (t.isFirstTrack) {
              // 第一軌決定 Master Clock 長度
              let rawLen = newBuf.duration;
              if (loopQuant && bpm > 0) {
                const beatLen = 60 / bpm;
                rawLen = Math.max(beatLen, Math.round(rawLen / beatLen) * beatLen);
              }
              masterLoopLen = rawLen;
              loopStartTime = audioCtx.currentTime;
              clockRunning  = true;
              updateMasterClock();
              if (metroOn) scheduleMetro();
            } else if (loopSync && masterLoopLen) {
              // 非第一軌：記錄錄音開始時的 loop 偏移，補靜音對齊
              newBuf = fitToMasterLen(newBuf, t._recStartOffset || 0);
            }
            t.buffer = newBuf;
          }

          // LIVE 模式自動播放，STEP 模式停在 STOPPED
          if (loopMode === 'LIVE' || isOverdub) {
            playTrack(t, true);
            setState(t, S.PLAYBACK);

            // LIVE 模式：Simul-Start
            if (loopMode === 'LIVE' && !isOverdub && playMode === 'MULTI') {
              tracks.forEach(o => {
                if (o.id !== t.id && o.state === S.STOPPED && o.buffer) {
                  playTrack(o, true);
                  setState(o, S.PLAYBACK);
                  if (o.muted && o.gainNode) o.gainNode.gain.value = 0;
                }
              });
            }
          } else {
            // STEP 模式：停在 STOPPED
            setState(t, S.STOPPED);
          }

        } catch(err) {
          showErr('解碼失敗：' + err.message);
          setState(t, t.buffer ? S.STOPPED : S.EMPTY);
        }
        resolve();
      };
      rec.stop();
    };

    if (loopMode === 'LIVE' && clockRunning && !isOverdub) {
      // LIVE 模式：等到 loop 邊界才停止錄音
      const waitMs = timeToNextBoundary() * 1000;
      setTimeout(doStop, Math.max(0, waitMs - 20));
    } else {
      doStop();
    }
  });
}

// ════════════════════════════════════════════════════════
// 狀態機
// ════════════════════════════════════════════════════════

// TRIGGER 按鈕
async function onTrigger(id) {
  const t = tracks[id];

  // OVERDUBBING：TRIGGER 無效（disabled，此處為保險）
  if (t.state === S.OVERDUBBING) return;

  // SINGLE 模式：停止其他正在播放的軌道
  if (playMode === 'SINGLE') {
    tracks.forEach(o => {
      if (o.id !== id && o.state === S.PLAYBACK) {
        fadeStop(o, () => setState(o, S.STOPPED));
      }
    });
  }

  switch(t.state) {

    case S.EMPTY:
      // 重錄第一軌（無 Master Clock）→ 清空所有軌道
      if (!clockRunning) {
        clearAllTracks();
      }
      // 記錄開始錄音時的 loop 位置（非第一軌用）
      t._recStartOffset = clockRunning ? masterClockPos() : 0;
      await startRecording(t, false);
      break;

    case S.RECORDING:
    case S.STANDBY:
      await stopRecording(t, false);
      break;

    case S.PLAYBACK:
      // 停止播放 → STOPPED
      fadeStop(t, () => setState(t, S.STOPPED));
      break;

    case S.STOPPED:
      // 對齊 Master Clock 重新播放
      playTrack(t, true);
      setState(t, S.PLAYBACK);
      break;
  }
}

// STOP 按鈕
async function onStop(id) {
  const t = tracks[id];
  switch(t.state) {
    case S.RECORDING:
    case S.STANDBY:
      // 放棄錄音，回到 EMPTY
      t.recScheduled = false;
      if (autoRecTimer) { clearInterval(autoRecTimer); autoRecTimer = null; }
      if (t.mediaRecorder && t.mediaRecorder.state !== 'inactive') {
        t.mediaRecorder.onstop = () => {};
        t.mediaRecorder.stop();
      }
      setState(t, S.EMPTY);
      setInfo('Track ' + (id+1) + ' cancelled');
      break;

    case S.PLAYBACK:
      fadeStop(t, () => setState(t, S.STOPPED));
      break;

    case S.OVERDUBBING:
      // 放棄疊錄，回到播放
      if (t.mediaRecorder && t.mediaRecorder.state !== 'inactive') {
        t.mediaRecorder.onstop = () => {
          playTrack(t);
          setState(t, S.PLAYBACK);
        };
        t.mediaRecorder.stop();
      }
      break;
  }
}

// DUB 按鈕
async function onDub(id) {
  const t = tracks[id];
  if (t.state === S.PLAYBACK) {
    await startRecording(t, true);
  } else if (t.state === S.OVERDUBBING) {
    await stopRecording(t, true);
  }
}

// MUTE（只由此控制，其他操作不影響）
function onMute(id) {
  const t = tracks[id];
  if (t.state !== S.PLAYBACK) return;
  t.muted = !t.muted;
  if (t.gainNode) t.gainNode.gain.value = t.muted ? 0 : t.volume;
  rerenderTrack(id);
}

// UNDO
function onUndo(id) {
  const t = tracks[id];
  if (!t.prevBuffer) return;
  t.redoBuffer = t.buffer;
  t.buffer     = t.prevBuffer;
  t.prevBuffer = null;
  if (t.state === S.PLAYBACK || t.state === S.STOPPED) playTrack(t);
  setInfo('Track ' + (id+1) + ' undone');
  rerenderTrack(id);
}

// REDO
function onRedo(id) {
  const t = tracks[id];
  if (!t.redoBuffer) return;
  t.prevBuffer = t.buffer;
  t.buffer     = t.redoBuffer;
  t.redoBuffer = null;
  if (t.state === S.PLAYBACK || t.state === S.STOPPED) playTrack(t);
  setInfo('Track ' + (id+1) + ' redone');
  rerenderTrack(id);
}

// 單軌清除
function onClear(id) {
  const t = tracks[id];
  t.recScheduled = false;
  if (autoRecTimer && t.state === S.STANDBY) { clearInterval(autoRecTimer); autoRecTimer = null; }
  if (t.mediaRecorder && t.mediaRecorder.state !== 'inactive') {
    t.mediaRecorder.onstop = () => {};
    t.mediaRecorder.stop();
  }
  stopSource(t);
  Object.assign(t, {
    state:S.EMPTY, buffer:null, prevBuffer:null, redoBuffer:null,
    muted:false, loopCount:0, gainNode:null, analyserNode:null,
    mediaRecorder:null, recChunks:[], recScheduled:false, _recStartOffset:0
  });
  rerenderTrack(id);
}

// 清空所有軌道（不重置 Master Clock）
function clearAllTracks() {
  tracks.forEach(t => onClear(t.id));
}

// All Stop
function allStop() {
  if (autoRecTimer) { clearInterval(autoRecTimer); autoRecTimer = null; }
  tracks.forEach(t => {
    t.recScheduled = false;
    if (t.mediaRecorder && t.mediaRecorder.state !== 'inactive') {
      t.mediaRecorder.onstop = () => {};
      t.mediaRecorder.stop();
    }
    if (t.state !== S.EMPTY) {
      fadeStop(t, () => setState(t, t.buffer ? S.STOPPED : S.EMPTY));
    }
    // MUTE 狀態保留
  });
  setInfo(T[lang].all_stop);
}

// Clear All（重置 Master Clock）
function clearAll() {
  if (autoRecTimer) { clearInterval(autoRecTimer); autoRecTimer = null; }
  clearAllTracks();
  masterLoopLen = null;
  loopStartTime = null;
  clockRunning  = false;
  updateMasterClock();
  setInfo(T[lang].clear_all);
}

// ════════════════════════════════════════════════════════
// 軌道設定
// ════════════════════════════════════════════════════════
function setTrackVol(id, v) {
  const t = tracks[id]; t.volume = parseFloat(v);
  if (t.gainNode && !t.muted) t.gainNode.gain.value = t.volume;
  const el = document.getElementById('vv'+id);
  if (el) el.textContent = Math.round(t.volume*100)+'%';
}
function toggleOneShot(id) { tracks[id].oneShot = !tracks[id].oneShot; rerenderTrack(id); }
function setDubMode(id, mode) { tracks[id].dubMode = mode; rerenderTrack(id); }

// ════════════════════════════════════════════════════════
// 全域設定
// ════════════════════════════════════════════════════════
function setMasterVol(v) {
  if (masterGain) masterGain.gain.value = parseFloat(v);
  document.getElementById('mvol-pct').textContent = Math.round(v*100)+'%';
}
function changeBPM(d) {
  bpm = Math.max(40, Math.min(240, bpm + d));
  document.getElementById('bpm-in').value = bpm;
}
function setBPM(v) { bpm = Math.max(40, Math.min(240, parseInt(v)||120)); }
function setMode(m) {
  playMode = m;
  document.getElementById('md-multi').classList.toggle('active', m==='MULTI');
  document.getElementById('md-single').classList.toggle('active', m==='SINGLE');
}
function setLoopMode(m) {
  loopMode = m;
  document.getElementById('mc-live').classList.toggle('active', m==='LIVE');
  document.getElementById('mc-step').classList.toggle('active', m==='STEP');
}
function toggle(key) {
  const map = { loopSync:'tog-sync', countIn:'tog-cin', autoRec:'tog-arec',
                metro:'tog-metro', loopQuant:'tog-lq' };
  if (key==='loopSync')  loopSync  = !loopSync;
  if (key==='countIn')   countIn   = !countIn;
  if (key==='autoRec')   autoRec   = !autoRec;
  if (key==='loopQuant') loopQuant = !loopQuant;
  if (key==='metro') {
    metroOn = !metroOn;
    if (metroOn && audioCtx) { metroNext = 0; scheduleMetro(); }
  }
  const vals = { loopSync, countIn, autoRec, metro:metroOn, loopQuant };
  const el = document.getElementById(map[key]);
  if (el) el.classList.toggle('on', vals[key]);
}

// ════════════════════════════════════════════════════════
// Master Clock 可視化
// ════════════════════════════════════════════════════════
function updateMasterClock() {
  const posEl   = document.getElementById('mc-pos');
  const cntEl   = document.getElementById('mc-count');
  const bar     = document.getElementById('mc-prog-bar');
  const handle  = document.getElementById('mc-drag-handle');
  if (!clockRunning || !masterLoopLen || !audioCtx) {
    if (posEl) posEl.textContent = T[lang].mc_waiting;
    if (cntEl) cntEl.textContent = '';
    if (bar)   bar.style.width = '0%';
    if (handle)handle.style.left = '0%';
    return;
  }
  const elapsed = audioCtx.currentTime - loopStartTime;
  const pos     = elapsed % masterLoopLen;
  const pct     = (pos / masterLoopLen * 100).toFixed(1);
  const count   = Math.floor(elapsed / masterLoopLen);
  if (posEl) posEl.textContent = pos.toFixed(2) + 's / ' + masterLoopLen.toFixed(2) + 's';
  if (cntEl) cntEl.textContent = '×' + count;
  if (bar)   bar.style.width  = pct + '%';
  if (handle)handle.style.left = pct + '%';
}

// Master Clock 進度條拖曳
function setupClockDrag() {
  const wrap   = document.getElementById('mc-prog-wrap');
  const handle = document.getElementById('mc-drag-handle');
  if (!wrap || !handle) return;

  let dragging = false;

  function seekTo(clientX) {
    if (!masterLoopLen || !clockRunning) return;
    const rect = wrap.getBoundingClientRect();
    const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const newPos = pct * masterLoopLen;
    // 調整 loopStartTime 使當前位置等於 newPos
    loopStartTime = audioCtx.currentTime - newPos;
    // 重新同步所有播放中的軌道
    tracks.forEach(t => {
      if (t.state === S.PLAYBACK || t.state === S.OVERDUBBING) {
        playTrack(t, false);
      }
    });
  }

  wrap.addEventListener('mousedown',  e => { dragging = true; seekTo(e.clientX); });
  wrap.addEventListener('touchstart', e => { dragging = true; seekTo(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('mousemove',  e => { if (dragging) seekTo(e.clientX); });
  document.addEventListener('touchmove',  e => { if (dragging) seekTo(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('mouseup',  () => { dragging = false; });
  document.addEventListener('touchend', () => { dragging = false; });
}

// ════════════════════════════════════════════════════════
// 狀態更新工具
// ════════════════════════════════════════════════════════
function setState(t, s) { t.state = s; rerenderTrack(t.id); }
function setInfo(m) { document.getElementById('info').textContent = m; }
function showErr(m) { const e=document.getElementById('err'); e.textContent=m; e.style.display='block'; }

// ════════════════════════════════════════════════════════
// VU meter HTML
// ════════════════════════════════════════════════════════
function vuHTML(id) {
  const color = TRACK_COLORS[id];
  let s = '';
  for (let i = 0; i < SEGS; i++) {
    const h   = 22 + Math.round((i/SEGS)*78);
    const col = i<13?color:i<18?'#FFD60A':'#FF3B30';
    s += `<div class="vu-s" id="vu${id}_${i}" style="height:${h}%;background:${col};opacity:.2"></div>`;
  }
  return `<div class="vu">${s}</div>`;
}

// ════════════════════════════════════════════════════════
// Track Card HTML
// ════════════════════════════════════════════════════════
function trackHTML(t) {
  const {id,state,volume,prevBuffer,redoBuffer,oneShot,dubMode,loopCount,muted} = t;
  const tc        = TRACK_COLORS[id];
  const L         = T[lang];
  const hasData   = !!t.buffer;
  const canStop   = state !== S.EMPTY && state !== S.STOPPED;
  const canDub    = state === S.PLAYBACK || state === S.OVERDUBBING;
  const isDubbing = state === S.OVERDUBBING;
  const canMute   = state === S.PLAYBACK;
  const trigDisabled = state === S.OVERDUBBING;
  const stateColor = {
    EMPTY:'#303038', RECORDING:'var(--red)', PLAYBACK:'var(--green)',
    OVERDUBBING:'var(--orange)', STOPPED:'#5A5A6E', STANDBY:'var(--yellow)'
  }[state] || '#303038';

  return `
<div class="tc" id="tc${id}" data-st="${state}">
  <div class="tc-hd">
    <div class="led led-${state}"></div>
    <div class="tc-meta">
      <div class="tc-name" style="color:${state===S.EMPTY?tc+'66':tc}">${L.track} ${id+1}</div>
      <div class="tc-state" style="color:${stateColor}">${L.state[state]||state}</div>
      <div class="tc-loop-ct" id="lc${id}">${state===S.PLAYBACK&&loopCount?'×'+loopCount:''}</div>
    </div>
    ${vuHTML(id)}
  </div>
  <div class="tc-prog-wrap"><div class="tc-prog-bar" id="pb${id}" style="background:${tc}"></div></div>
  <span class="tc-time" id="tm${id}">${hasData?'-- / '+t.buffer.duration.toFixed(2)+'s':'-- / --'}</span>
  <div class="tc-vol">
    <input type="range" min="0" max="1" step="0.02" value="${volume}"
      oninput="setTrackVol(${id},this.value)">
    <span class="tc-vol-val" id="vv${id}">${Math.round(volume*100)}%</span>
  </div>
  <div class="tc-btns1">
    <button class="tbtn tb-trig" data-s="${state}" onclick="onTrigger(${id})"
      style="flex:2" ${trigDisabled?'disabled':''}>
      ${trigDisabled?'':L.trig[state]||''}
    </button>
    <button class="tbtn tb-stop" onclick="onStop(${id})"
      ${canStop?'':'disabled'}>${L.stop}</button>
    <button class="tbtn tb-dub ${isDubbing?'dubbing':''}" onclick="onDub(${id})"
      ${canDub?'':'disabled'}>${isDubbing?L.dub_on:L.dub_off}</button>
    <button class="tbtn tb-mute ${muted?'muting':''}" onclick="onMute(${id})"
      ${canMute?'':'disabled'}>${muted?L.muted:L.mute}</button>
  </div>
  <div class="tc-btns2">
    <button class="tbtn tb-undo" onclick="onUndo(${id})"
      ${prevBuffer?'':'disabled'}>${L.undo}</button>
    <button class="tbtn tb-redo" onclick="onRedo(${id})"
      ${redoBuffer?'':'disabled'}>${L.redo}</button>
    <button class="tbtn tb-clear" onclick="onClear(${id})"
      ${hasData||state!==S.EMPTY?'':'disabled'}
      style="opacity:${hasData||state!==S.EMPTY?1:.3}">${L.clear}</button>
  </div>
  <div class="tc-opts">
    <button class="opt-btn ${oneShot?'on':''}" onclick="toggleOneShot(${id})">${L.one_shot}</button>
    <div class="dub-mode-grp">
      <button class="dm-btn ${dubMode==='DUB'?'active':''}"
        onclick="setDubMode(${id},'DUB')">${L.dub}</button>
      <button class="dm-btn ${dubMode==='REPLACE'?'active':''}"

  </div>

}

// ════════════════════════════════════════════════════════
// 渲染
// ════════════════════════════════════════════════════════
function renderAll() {
  document.getElementById('tracks').innerHTML = tracks.map(t => trackHTML(t)).join('');
}
function rerenderTrack(id) {
  const el = document.getElementById('tc'+id);
  if (!el) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = trackHTML(tracks[id]);
  el.parentNode.replaceChild(tmp.firstElementChild, el);
}

// ════════════════════════════════════════════════════════
// RMS 工具
// ════════════════════════════════════════════════════════
function getRMS(an) {
  const d = new Uint8Array(an.frequencyBinCount);
  an.getByteTimeDomainData(d);
  let r = 0;
  for (let i = 0; i < d.length; i++) { const v=(d[i]-128)/128; r+=v*v; }
  return Math.sqrt(r/d.length);
}

// ════════════════════════════════════════════════════════
// 主動畫迴圈
// ════════════════════════════════════════════════════════
(function animLoop() {
  // Master Clock
  updateMasterClock();

  // 每軌 VU + 進度條 + timecode + loop count
  for (let i = 0; i < TRACK_COUNT; i++) {
    const t = tracks[i];

    // VU meter
    let raw = 0;
    if ((t.state===S.RECORDING||t.state===S.OVERDUBBING) && micAnalyser)
      raw = getRMS(micAnalyser);
    else if (t.state===S.PLAYBACK && t.analyserNode)
      raw = getRMS(t.analyserNode);
    smoothLv[i] = raw>smoothLv[i] ? raw*.8+smoothLv[i]*.2 : smoothLv[i]*.83;
    const lv = Math.min(1, smoothLv[i]*5);
    for (let s = 0; s < SEGS; s++) {
      const seg = document.getElementById(`vu${i}_${s}`);
      if (seg) seg.style.opacity = lv>=(s+1)/SEGS ? '1' : '.2';
    }

    // 進度條 + timecode（對齊 Master Clock）
    if (t.buffer && clockRunning && masterLoopLen && audioCtx) {
      const pos  = (audioCtx.currentTime - loopStartTime) % masterLoopLen % t.buffer.duration;
      const pct  = pos / t.buffer.duration * 100;
      const pb   = document.getElementById('pb'+i);
      const tm   = document.getElementById('tm'+i);
      if (pb) pb.style.width = pct + '%';
      if (tm && t.state===S.PLAYBACK) {
        tm.textContent = pos.toFixed(2) + 's / ' + t.buffer.duration.toFixed(2) + 's';
      }
      // loop count
      const n = Math.floor((audioCtx.currentTime - loopStartTime) / masterLoopLen);
      if (n !== t.loopCount) {
        t.loopCount = n;
        const lcel = document.getElementById('lc'+i);
        if (lcel) lcel.textContent = '×'+n;
      }
    }
  }
  requestAnimationFrame(animLoop);
})();
