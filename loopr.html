<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>LOOPR</title>
<style>
:root{
  --bg:#0A0A0F;--card:#111118;--border:#1C1C26;
  --accent:#FFD60A;--green:#30D158;--red:#FF3B30;
  --text:#E5E5EA;--muted:#3A3A44;
  --font:'SF Mono','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:48px}
button{cursor:pointer;border:none;outline:none;font-family:var(--font)}

#hdr{padding:24px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.logo{font-size:24px;font-weight:700;letter-spacing:5px}
.logo em{color:var(--accent);font-style:normal}
#hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
#loop-status{font-size:11px;letter-spacing:2px;color:var(--muted)}
#loop-status.running{color:var(--green)}
#reset-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:7px 13px;border-radius:8px;font-size:11px;letter-spacing:1px}

#tracks{padding:14px 16px;display:flex;flex-direction:column;gap:10px}

.track{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
@keyframes recBorder{0%,100%{border-color:#FF3B3033}50%{border-color:#FF3B3099}}
.track[data-state=recording]{animation:recBorder 1.2s infinite}

.track-main{padding:13px 13px 12px;display:flex;align-items:center;gap:11px}

.rec-btn{width:54px;height:54px;border-radius:50%;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.rec-btn[data-state=idle]     {background:#1C1C26;color:#404048}
.rec-btn[data-state=recording]{background:var(--red);color:#fff;box-shadow:0 0 22px #FF3B3088}
.rec-btn[data-state=playing]  {background:var(--green);color:#fff}
.rec-btn[data-state=muted]    {background:#1C1C26;color:var(--green);border:2px solid #30D15840}

.track-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
.track-row1{display:flex;justify-content:space-between;align-items:center}
.track-label{font-size:11px;font-weight:700;letter-spacing:2px}
.track-state{font-size:10px;letter-spacing:2px}

/* ── VU Meter ── */
.vu-wrap{
  display:flex;gap:2px;align-items:flex-end;
  height:18px;padding:0 1px;
}
.vu-seg{
  flex:1;border-radius:2px;
  transition:opacity .05s;
}

input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;width:100%;cursor:pointer;height:20px}
input[type=range]::-webkit-slider-runnable-track{background:#1C1C26;height:3px;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#fff;margin-top:-6px}
input[type=range]::-moz-range-track{background:#1C1C26;height:3px;border-radius:2px}
input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#fff;border:none}

.del-btn{background:none;color:#252530;font-size:14px;padding:4px 5px;flex-shrink:0;align-self:center;transition:color .15s}
.del-btn:hover{color:var(--red)}

#info{padding:6px 20px 0;font-size:11px;color:var(--muted);letter-spacing:1px;min-height:22px}
#err{margin:10px 16px 0;padding:10px 14px;background:#3D1A1A;border-radius:10px;color:var(--red);font-size:12px;display:none}
#legend{margin-top:20px;padding:0 20px;display:flex;justify-content:center}
#legend span{font-size:11px;color:#252530;letter-spacing:1px}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo">LOOP<em>R</em></div>
  <div id="hdr-right">
    <div id="loop-status">○ stopped</div>
    <button id="reset-btn" onclick="resetAll()">RESET</button>
  </div>
</div>

<div id="info">tap ● to start recording</div>
<div id="err"></div>
<div id="tracks"></div>
<div id="legend"><span>● rec &nbsp;■ stop &nbsp;|| mute &nbsp;▶ play</span></div>

<script>
const COLORS = ['#FF453A','#FF9F0A','#30D158','#64D2FF','#BF5AF2','#FF6B6B'];
const LABELS  = {idle:'READY', recording:'REC', playing:'PLAY', muted:'MUTE'};
const ICONS   = {idle:'●', recording:'■', playing:'||', muted:'▶'};
const LCOLOR  = {idle:'#2A2A36', recording:'#FF3B30', playing:'#30D158', muted:'#2A2A36'};
const MAX = 6;
const SEGS = 20; // number of VU segments

// Audio
let ctx=null, micStream=null, micAnalyser=null;
let masterLen=null, loopStart=null;
let recTrackId=null, recorder=null, chunks=[];
const sources={}, gains={}, analysers={}, buffers={}, vols={};

// Track state
const states={}, trackVols={};
for(let i=0;i<MAX;i++){states[i]='idle';trackVols[i]=0.8;vols[i]=0.8;}

// ── Audio ──────────────────────────────────────────────
async function initAudio(){
  if(ctx){if(ctx.state==='suspended')await ctx.resume();return true;}
  try{
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    micStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}
    });
    micAnalyser=ctx.createAnalyser();
    micAnalyser.fftSize=256;
    ctx.createMediaStreamSource(micStream).connect(micAnalyser);
    return true;
  }catch(e){
    const el=document.getElementById('err');
    el.textContent='⚠ 麥克風權限被拒絕，請在瀏覽器設定中允許';
    el.style.display='block';
    return false;
  }
}

function getMime(){
  return['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4','']
    .find(t=>!t||MediaRecorder.isTypeSupported(t))||'';
}

function scheduleTrack(id,buf){
  if(sources[id]){try{sources[id].stop();}catch(e){}}
  const gain=ctx.createGain();
  gain.gain.value=vols[id]??0.8;
  gains[id]=gain;
  const an=ctx.createAnalyser();
  an.fftSize=256;
  analysers[id]=an;
  gain.connect(an);
  an.connect(ctx.destination);
  const src=ctx.createBufferSource();
  src.buffer=buf;src.loop=true;src.loopEnd=buf.duration;
  src.connect(gain);
  const now=ctx.currentTime;
  const offset=loopStart?((now-loopStart)%masterLen)%buf.duration:0;
  src.start(now,offset);
  sources[id]=src;
}

async function startRec(id){
  if(!await initAudio())return;
  if(recTrackId!==null)await stopRec(recTrackId);
  recTrackId=id;chunks=[];
  const mime=getMime();
  recorder=new MediaRecorder(micStream,mime?{mimeType:mime}:{});
  recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  recorder.start(50);
  states[id]='recording';
  setInfo(masterLen===null?'錄音中… 點 ■ 停止（第一軌決定 loop 長度）':'錄音中… 點 ■ 停止');
  rerenderTrack(id);
}

function stopRec(id){
  return new Promise(res=>{
    if(!recorder||recorder.state==='inactive'){res();return;}
    recorder.onstop=async()=>{
      try{
        const blob=new Blob(chunks,{type:chunks[0]?.type||'audio/webm'});
        const buf=await ctx.decodeAudioData(await blob.arrayBuffer());
        buffers[id]=buf;
        if(masterLen===null){masterLen=buf.duration;loopStart=ctx.currentTime;updateStatus();}
        scheduleTrack(id,buf);
        states[id]='playing';
        setInfo('Track '+(id+1)+' playing');
      }catch(e){states[id]='idle';setInfo('解碼失敗，請重試');}
      recTrackId=null;rerenderTrack(id);res();
    };
    recorder.stop();
  });
}

async function tap(id){
  const s=states[id];
  if(s==='idle')await startRec(id);
  else if(s==='recording')await stopRec(id);
  else if(s==='playing'){
    if(gains[id])gains[id].gain.value=0;
    states[id]='muted';setInfo('Track '+(id+1)+' muted');rerenderTrack(id);
  }else if(s==='muted'){
    if(gains[id])gains[id].gain.value=vols[id]??0.8;
    states[id]='playing';setInfo('Track '+(id+1)+' playing');rerenderTrack(id);
  }
}

function setVol(id,v){
  vols[id]=trackVols[id]=parseFloat(v);
  if(gains[id]&&states[id]!=='muted')gains[id].gain.value=vols[id];
}

function delTrack(id){
  if(sources[id]){try{sources[id].stop();}catch(e){}delete sources[id];}
  delete gains[id];delete analysers[id];delete buffers[id];
  states[id]='idle';setInfo('Track '+(id+1)+' cleared');rerenderTrack(id);
}

function resetAll(){
  if(recorder&&recorder.state!=='inactive'){try{recorder.stop();}catch(e){}}
  Object.values(sources).forEach(s=>{try{s.stop();}catch(e){}});
  [sources,gains,analysers,buffers].forEach(o=>Object.keys(o).forEach(k=>delete o[k]));
  masterLen=null;loopStart=null;recTrackId=null;
  for(let i=0;i<MAX;i++){states[i]='idle';trackVols[i]=0.8;vols[i]=0.8;}
  updateStatus();setInfo('tap ● to start recording');
  document.getElementById('err').style.display='none';
  renderAll();
}

function updateStatus(){
  const el=document.getElementById('loop-status');
  if(masterLen){el.textContent='● '+masterLen.toFixed(2)+'s loop';el.classList.add('running');}
  else{el.textContent='○ stopped';el.classList.remove('running');}
}
function setInfo(t){document.getElementById('info').textContent=t;}

// ── VU meter segments HTML ──────────────────────────────
function vuHTML(trackId){
  const color=COLORS[trackId];
  // 20 segments, varying heights (like real VU)
  // First 12 = green zone, 13-17 = yellow, 18-20 = red
  const segs=[];
  for(let s=0;s<SEGS;s++){
    const h=30+Math.round((s/SEGS)*70); // 30% to 100% height
    let segColor;
    if(s<12)      segColor=color;
    else if(s<17) segColor='#FFD60A';
    else          segColor='#FF3B30';
    // dim (off state) = very dark version
    segs.push(`<div class="vu-seg" id="vs${trackId}_${s}"
      style="height:${h}%;background:${segColor};opacity:0.12"></div>`);
  }
  return `<div class="vu-wrap" id="vu${trackId}">${segs.join('')}</div>`;
}

// ── Render ──────────────────────────────────────────────
function trackHTML(i){
  const s=states[i],c=COLORS[i],v=trackVols[i];
  const hasContent=!!buffers[i]||s==='recording';
  return `
<div class="track" id="tk${i}" data-state="${s}">
  <div class="track-main">
    <button class="rec-btn" data-state="${s}" onclick="tap(${i})">${ICONS[s]}</button>
    <div class="track-body">
      <div class="track-row1">
        <span class="track-label" style="color:${s==='idle'?'#2A2A36':c}">T${i+1}</span>
        <span class="track-state" style="color:${LCOLOR[s]}">${LABELS[s]}</span>
      </div>
      ${vuHTML(i)}
      <input type="range" min="0" max="1" step="0.02" value="${v}" oninput="setVol(${i},this.value)">
    </div>
    ${hasContent?`<button class="del-btn" onclick="delTrack(${i})">✕</button>`:''}
  </div>
</div>`;
}

function renderAll(){
  document.getElementById('tracks').innerHTML=
    Array.from({length:MAX},(_,i)=>trackHTML(i)).join('');
}

function rerenderTrack(id){
  const el=document.getElementById('tk'+id);
  if(!el)return;
  const tmp=document.createElement('div');
  tmp.innerHTML=trackHTML(id);
  el.parentNode.replaceChild(tmp.firstElementChild,el);
}

// ── VU meter animation ──────────────────────────────────
function getRMS(an){
  const d=new Uint8Array(an.frequencyBinCount);
  an.getByteTimeDomainData(d);
  let rms=0;
  for(let i=0;i<d.length;i++){const v=(d[i]-128)/128;rms+=v*v;}
  return Math.sqrt(rms/d.length);
}

// Smooth level per track
const smoothLevel=new Float32Array(MAX);

(function vuLoop(){
  for(let i=0;i<MAX;i++){
    const s=states[i];
    let raw=0;
    if(s==='recording'&&micAnalyser)      raw=getRMS(micAnalyser);
    else if(s==='playing'&&analysers[i])  raw=getRMS(analysers[i]);

    // Smooth: fast attack, slow decay
    smoothLevel[i]=raw>smoothLevel[i]
      ? raw*0.8+smoothLevel[i]*0.2
      : smoothLevel[i]*0.85;

    const level=Math.min(1,smoothLevel[i]*5); // scale up

    // Update segments directly in DOM
    for(let seg=0;seg<SEGS;seg++){
      const el=document.getElementById('vs'+i+'_'+seg);
      if(!el)continue;
      const threshold=(seg+1)/SEGS;
      el.style.opacity=level>=threshold?'1':'0.1';
    }
  }
  requestAnimationFrame(vuLoop);
})();

renderAll();
</script>
</body>
</html>
